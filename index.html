<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Oda ✨</title>
    <style>
        /* --- ARKA PLAN VE GEÇİŞ AYARLARI --- */
        body { 
            margin: 0; 
            background-image: url('manzara1.png'); /* Klasördeki manzara1.png dosyasını okur */
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #fdf6ec; 
            color: #4a3f35; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            transition: background-image 0.5s ease-in-out; 
        }
        
        #text { 
            font-size: 26px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            text-align: center; 
            animation: pulse 2s infinite; 
            z-index: 10; 
            text-shadow: 0 2px 10px rgba(255,255,255,0.8); 
        }
        @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; color: #ff7a59; } }
        
        /* 8 Fotoğraflık Slayt Galerisi */
        #gallery { position: relative; width: 290px; height: 390px; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); border: 4px solid #fff; background: #fff; z-index: 10; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; display: none; }
        .active { opacity: 1; display: block; }

        /* Anı Videosu Penceresi */
        #anilarOverlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(255, 255, 255, 0.98); border: 2px solid #ff9f43; border-radius: 24px; z-index: 4000; padding: 20px; flex-direction: column; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .video-container { width: 100%; height: 200px; background: #000; border-radius: 16px; margin-bottom: 15px; overflow: hidden; }
        #aniVideo { width: 100%; height: 100%; object-fit: contain; }
        .close-ani-btn { background: #ff7a59; color: white; border: none; padding: 12px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .close-ani-btn:hover { background: #ff6337; }

        /* Kontrol Paneli ve Tek Şarkılık Müzik Çalar */
        #controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 20; }
        .btn-group { display: flex; gap: 8px; }
        .control-btn { background: #fff; border: 1px solid #ffeaa7; color: #7d6e63; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; }
        .control-btn:hover { transform: translateY(-2px); background: #fffdf9; }
        .ani-btn { background: #ff7a59 !important; color: white !important; font-weight: bold; }
        .ani-btn:hover { background: #ff6337 !important; }
        
        #musicPlayer { background: #fff; padding: 14px; border-radius: 20px; width: 320px; border: 2px solid #ffeaa7; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05); }
        .player-info { display: flex; align-items: center; gap: 12px; }
        #songImg { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; }
        #progressBar { width: 100%; height: 6px; background: #f0e6df; border-radius: 3px; cursor: pointer; margin-top: 10px; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; background: #ff7a59; border-radius: 3px; }

        /* Çiçek Yağmuru Efekti */
        .snowflake { position: fixed; top: -60px; pointer-events: none; animation: fall linear infinite; z-index: 5; font-size: 20px; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ANA BAŞLIK -->
    <div id="text">BİZİM ODAMIZA HOŞ GELDİN! ✨</div>
    
    <!-- 8 ADET FOTOĞRAFLIK SLAYT GALERİSİ -->
    <div id="gallery"></div>

    <!-- ANILAR PENCERESİ (1 VİDEO) -->
    <div id="anilarOverlay">
        <h3 style="margin-top:0; color:#ff7a59;">🎬 Bizim Videomuz</h3>
        <div class="video-container">
            <video id="aniVideo" controls></video>
        </div>
        <button class="close-ani-btn" onclick="closeAnilar()">Kapat</button>
    </div>

    <!-- KONTROLLER VE TEK ŞARKILIK OYNATICI -->
    <div id="controls">
        <div class="btn-group">
            <button class="control-btn" onclick="changeBackground()">🖼️ Manzarayı Değiştir</button>
            <button class="control-btn ani-btn" onclick="openAnilar()">🎬 VİDEOMUZU İZLE</button>
        </div>
        
        <div id="musicPlayer">
            <div class="player-info">
                <img id="songImg" src="sarki-kapak.jpg"> <!-- sarki-kapak.jpg dosyasını okur -->
                <div>
                    <div style="font-size:11px; color:#aaa; font-weight:bold;">ŞU AN ÇALAN</div>
                    <div id="songName" style="font-size:14px; font-weight:bold; color:#4a3f35;">Günün Şarkısı ☕</div>
                </div>
                <button id="pBtn" onclick="pPause()" style="background:none; border:none; color:#ff7a59; font-size:26px; cursor:pointer; margin-left:auto; outline:none;">⏸</button>
            </div>
            <div id="progressBar" onclick="seek(event)"><div id="progressFill"></div></div>
        </div>
    </div>

    <audio id="audio"></audio>

    <!-- SİTE FONKSİYONLARI -->
    <script>
        const aud = document.getElementById("audio");

        // Sabit Medya Dosya Adları
        const sarkiDosyasi = "sarki.mp3";
        const videoDosyasi = "video.mp4";
        
        // Tam 8 Adet Fotoğrafın Kodda Arandığı İsimler
        const resimListesi = [
            "resim1.jpeg", "resim2.jpeg", "resim3.jpeg", "resim4.jpeg", 
            "resim5.jpeg", "resim6.jpeg", "resim7.jpeg", "resim8.jpeg"
        ];

        // Sayfa yüklenir yüklenmez doğrudan her şeyi başlatır
        window.onload = function() {
            start();
        }

        function start() {
            aud.src = sarkiDosyasi;
            aud.play().catch(e => console.log("Otomatik oynatma tarayıcı engeline takılmış olabilir, sayfaya dokununca çalar."));
            startRain();
            createGallery();
            setInterval(nextSlide, 3000); // 3 saniyede bir fotoğraf değişir
            
            aud.addEventListener('timeupdate', () => {
                if (aud.duration) {
                    const pct = (aud.currentTime / aud.duration) * 100;
                    document.getElementById("progressFill").style.width = pct + "%";
                }
            });
        }

        // İki Arka Plan Arasında Geçiş Fonksiyonu
        let currentBG = 1;
        function changeBackground() {
            if (currentBG === 1) {
                document.body.style.backgroundImage = "url('manzara2.png')";
                currentBG = 2;
            } else {
                document.body.style.backgroundImage = "url('manzara1.png')";
                currentBG = 1;
            }
        }

        function pPause() { 
            if(aud.paused) { aud.play(); document.getElementById("pBtn").innerText="⏸"; } 
            else { aud.pause(); document.getElementById("pBtn").innerText="▶️"; } 
        }
        
        function seek(e) {
            const bar = document.getElementById("progressBar");
            const pct = e.offsetX / bar.offsetWidth;
            aud.currentTime = pct * aud.duration;
        }

        function openAnilar() { 
            document.getElementById('anilarOverlay').style.display = 'flex'; 
            aud.pause(); 
            const v = document.getElementById('aniVideo');
            v.src = videoDosyasi;
            v.play();
        }
        
        function closeAnilar() { 
            const v = document.getElementById('aniVideo');
            v.pause();
            document.getElementById('anilarOverlay').style.display = 'none'; 
            aud.play();
        }

        // Çiçek Yağmuru Efekti
        function startRain() {
            setInterval(() => {
                const el = document.createElement('div');
                el.innerHTML = '🌸'; 
                el.className = 'snowflake';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }, 400);
        }

        function createGallery() {
            const gal = document.getElementById("gallery");
            resimListesi.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src; 
                img.className = 'slide' + (i === 0 ? ' active' : '');
                gal.appendChild(img);
            });
        }

        let sIdx = 0;
        function nextSlide() {
            const s = document.querySelectorAll('.slide');
            if(s.length === 0) return;
            s[sIdx].classList.remove('active');
            sIdx = (sIdx + 1) % s.length;
            s[sIdx].classList.add('active');
        }
    </script>
</body>
</html>

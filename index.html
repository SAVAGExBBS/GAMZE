                document.getElementById('lockDays').innerText = days < 10 ? "0" + days : days;
                document.getElementById('lockHours').innerText = hours < 10 ? "0" + hours : hours;
                document.getElementById('lockMinutes').innerText = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById('lockSeconds').innerText = seconds < 10 ? "0" + seconds : seconds;
            }
        }, 1000);
    }

    // --- ANA SİTENİN BAŞLATILMASI ---
    function initMainSite() {
        start();
        initCounter();
        checkUsernameAndSync();
        listenMessages();
        checkSurpriseDate();
    }

    function checkSurpriseDate() {
        document.getElementById('surpriseVideoOverlay').style.display = 'flex';
        
        if(!aud.paused) {
            aud.pause();
            document.getElementById("pBtn").innerText="▶️";
        }

        const videoId = "rgvmliHOIOE";
        document.getElementById('surprisePlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
    }

    function closeSurpriseVideo() {
        document.getElementById('surpriseVideoOverlay').style.display = 'none';
        document.getElementById('surprisePlayer').src = "";
        
        aud.play();
        document.getElementById("pBtn").innerText="⏸";
    }

    function checkUsernameAndSync() {
        usersRef.child(deviceId).once('value', (snapshot) => {
            if (snapshot.exists()) {
                username = snapshot.val();
                localStorage.setItem('chat_username', username);
                document.getElementById('nameModalOverlay').style.display = 'none';
            } else {
                let localName = localStorage.getItem('chat_username');
                if (localName && localName !== "Anonim") {
                    username = localName;
                    usersRef.child(deviceId).set(username);
                    document.getElementById('nameModalOverlay').style.display = 'none';
                } else {
                    document.getElementById('nameModalOverlay').style.display = 'flex';
                }
            }
        });
    }

    function saveUsername() {
        const input = document.getElementById('modalNameInput');
        let enteredName = input.value.trim();
        
        if (enteredName === "") {
            enteredName = "Anonim";
        }
        
        username = enteredName;
        localStorage.setItem('chat_username', username);
        
        usersRef.child(deviceId).set(username).then(() => {
            document.getElementById('nameModalOverlay').style.display = 'none';
            document.getElementById('chatMessages').innerHTML = "";
            listenMessages();
        });
    }

    function handleNameKeyPress(e) {
        if (e.key === 'Enter') {
            saveUsername();
        }
    }

    function start() {
        aud.src = sarkiDosyasi;
        aud.play().catch(e => console.log("Otomatik oynatma engellendi."));
        startRain();
        createGallery();
        setInterval(nextSlide, 3000);

        aud.addEventListener('timeupdate', () => {
            if (aud.duration) {
                const pct = (aud.currentTime / aud.duration) * 100;
                document.getElementById("progressFill").style.width = pct + "%";
            }
        });
    }

    function initCounter() {
        let startTime = localStorage.getItem('oda_start_time');
        if (!startTime) {
            const daysInMs = 219 * 24 * 60 * 60 * 1000;
            startTime = Date.now() - daysInMs;
            localStorage.setItem('oda_start_time', startTime);
        }

        function updateCounter() {
            const diff = Date.now() - parseInt(startTime);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const hDisplay = hours < 10 ? "0" + hours : hours;
            const mDisplay = minutes < 10 ? "0" + minutes : minutes;
            const sDisplay = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("cDays").innerText = days;
            document.getElementById("cTime").innerText = hDisplay + ":" + mDisplay + ":" + sDisplay;
        }
        updateCounter();
        setInterval(updateCounter, 1000);
    }

    function toggleChat() {
        const chat = document.getElementById('chatOverlay');
        if (chat.style.display === 'flex') {
            chat.style.display = 'none';
        } else {
            chat.style.display = 'flex';
            scrollChatToBottom();
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (text === "") return;
        if (!username) { checkUsernameAndSync(); return; }

        const now = new Date();
        const timeString = now.toLocaleDateString('tr-TR') + " " + now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});

        chatRef.push({
            user: username,
            message: text,
            timestamp: timeString
        });
        input.value = "";
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    function listenMessages() {
        chatRef.off(); 
        chatRef.on('child_added', (snapshot) => {
            const data = snapshot.val();
            renderMessage(data.user, data.message, data.timestamp);
        });
    }

    function renderMessage(user, msg, time) {
        const container = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        
        if (username && user === username) {
            msgDiv.className = 'msg-container my-message';
        } else {
            msgDiv.className = 'msg-container';
        }

        msgDiv.innerHTML = `
            <div class="msg-meta">
                <span>${user}</span>
                <span>${time}</span>
            </div>
            <div class="msg-text">${msg}</div>
        `;
        container.appendChild(msgDiv);
        scrollChatToBottom();
    }

    function scrollChatToBottom() {
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
    }

    function openManzara() {
        document.getElementById('manzaraOverlay').style.display = 'block';
    }

    function closeManzara() {
        document.getElementById('manzaraOverlay').style.display = 'none';
    }

    function pPause() {
        if(aud.paused) {
            aud.play();
            document.getElementById("pBtn").innerText="⏸";
        } else {
            aud.pause();
            document.getElementById("pBtn").innerText="▶️";
        }
    }

    function seek(e) {
        const bar = document.getElementById("progressBar");
        const pct = e.offsetX / bar.offsetWidth;
        aud.currentTime = pct * aud.duration;
    }

    function openAnilar() {
        document.getElementById('anilarOverlay').style.display = 'flex';
        aud.pause();
        const v = document.getElementById('aniVideo');
        v.src = videoDosyasi;
        v.play();
    }

    function closeAnilar() {
        const v = document.getElementById('aniVideo');
        v.pause();
        document.getElementById('anilarOverlay').style.display = 'none';
        aud.play();
    }

    function startRain() {
        setInterval(() => {
            const el = document.createElement('div');
            el.innerHTML = '🌸';
            el.className = 'snowflake';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }, 400);
    }

    function createGallery() {
        const gal = document.getElementById("gallery");
        resimListesi.forEach((src, i) => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'slide' + (i === 0 ? ' active' : '');
            gal.appendChild(img);
        });
    }

    let sIdx = 0;
    function nextSlide() {
        const s = document.querySelectorAll('.slide');
        if(s.length === 0) return;
        s[sIdx].classList.remove('active');
        sIdx = (sIdx + 1) % s.length;
        s[sIdx].classList.add('active');
    }
</script>
</body>
</html>
